<body>

    <script>
        // ==========================================
        // ⚙️ 配置区域：请在这里修改你的业务数据
        // ==========================================

        // 1. WhatsApp 号码池
        const waNumbers = [
            "60162926498",  // 客服 A
            "60167057443",  // 客服 B
            "60106608613"   // 客服 C
        ];

        // 2. 预设文本消息
        const defaultMessage = "你好，很高兴认识你";

        // 3. 缓存有效时间（设定为 30 天，单位为天）
        const cacheDays = 30;

        // 4. 新增：页面跳转的延迟时间（单位：毫秒）。800 毫秒（0.8秒）足够像素安全回传。
        const redirectDelay = 800;

        // ==========================================
        // 🚀 核心逻辑区域：设备识别、自动分配与跳转
        // ==========================================

        function redirectUser() {
            const cacheKey = "assigned_whatsapp_target";
            let targetNumber = null;

            // --- 步骤 1：检查缓存 ---
            const cachedDataStr = localStorage.getItem(cacheKey);
            if (cachedDataStr) {
                try {
                    const cachedData = JSON.parse(cachedDataStr);
                    const now = new Date().getTime();
                    if (now < cachedData.expiryTime) {
                        targetNumber = cachedData.phoneNumber;
                    }
                } catch (e) {
                    console.error("缓存解析异常");
                }
            }

            // --- 步骤 2：分配新号码并缓存 ---
            if (!targetNumber) {
                const randomIndex = Math.floor(Math.random() * waNumbers.length);
                targetNumber = waNumbers[randomIndex];
                
                const expiryTimestamp = new Date().getTime() + (cacheDays * 24 * 60 * 60 * 1000);
                
                localStorage.setItem(cacheKey, JSON.stringify({
                    phoneNumber: targetNumber,
                    expiryTime: expiryTimestamp
                }));
            }

            // --- 步骤 3：智能设备识别 ---
            // 通过正则表达式检测 User-Agent 中是否包含常见的移动设备关键词
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            
            let waLink = "";
            const encodedMessage = encodeURIComponent(defaultMessage);

            if (isMobile) {
                // 如果是移动端 -> 使用原生协议强拉起
                waLink = `whatsapp://send?phone=${targetNumber}&text=${encodedMessage}`;
            } else {
                // 如果是 PC 端 -> 使用通用网页协议
                waLink = `https://wa.me/${targetNumber}?text=${encodedMessage}`;
            }

            // --- 步骤 4：优化2 -> 延迟执行无感跳转，确保 Meta 接收到数据 ---
            // 使用 setTimeout 包裹原来的跳转逻辑
            setTimeout(function() {
                window.location.replace(waLink);
            }, redirectDelay);
        }

        redirectUser();
    </script>

</body>
